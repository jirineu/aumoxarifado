<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bruna Construções</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- TOPO -->

    <header class="topo">
        <h1>Bruna Construções</h1>
    </header>

    <!-- CONTEÚDO -->

    <main>

        <!-- ========================= -->
        <!-- ABA ESTOQUE -->
        <!-- ========================= -->

        <section id="aba-estoque" class="aba ativa">

            <div class="card">

                <h2>Registrar Saída</h2>

                <label>Material</label>
                <input type="text" id="material">

                <label>Quantidade</label>
                <input type="number" id="quantidade">

                <label>Funcionário</label>
                <input type="text" id="funcionario">

                <button onclick="registrarSaida()">
                    Registrar
                </button>

            </div>

            <div class="card">

                <h2>Histórico</h2>

                <div id="historico"></div>

            </div>

        </section>

        <!-- ========================= -->
        <!-- ABA PONTO -->
        <!-- ========================= -->

        <section id="aba-ponto" class="aba">

            <!-- CADASTRO -->

            <div class="card">

                <h2>Adicionar Funcionário</h2>

                <label>Nome</label>
                <input type="text" id="nomeFuncionario">

                <label>Função</label>
                <input type="text" id="funcaoFuncionario">

                <label>Horário de Trabalho</label>
                <input type="text" id="horarioFuncionario" placeholder="08:00 às 17:00">

                <button onclick="salvarFuncionario()">
                    Salvar Funcionário
                </button>

            </div>

            <!-- FILTRO -->

            <div class="card">

                <input
                    type="text"
                    id="filtroFuncionario"
                    placeholder="Buscar funcionário..."
                    onkeyup="filtrarFuncionarios()"
                >

            </div>

            <!-- FUNCIONÁRIOS -->

            <div class="card">

                <h2>Funcionários</h2>

                <div id="listaFuncionarios"></div>

            </div>

            <!-- HISTÓRICO -->

          <div class="card">

    <div class="topo-historico">

        <div>

            <h2>Histórico de Pontos</h2>

            <p id="dataAtual"></p>

        </div>

        <button
            class="btn-filtro"
            onclick="abrirFiltroPonto()"
        >
            🔍
        </button>

    </div>

    <div id="historicoPontos"></div>

</div>

        </section>

        <!-- ========================= -->
        <!-- ABA ARMÁRIOS -->
        <!-- ========================= -->

        <section id="aba-armarios" class="aba">

            <div class="card">

                <h2>Armários</h2>

                <div id="gradeArmarios"></div>

            </div>

        </section>

    </main>

    <!-- MENU INFERIOR -->

    <nav class="menu">

        <button onclick="abrirAba('estoque')">
            Estoque
        </button>

        <button onclick="abrirAba('ponto')">
            Ponto
        </button>

        <button onclick="abrirAba('armarios')">
            Armários
        </button>

    </nav>

</div>

<!-- POPUP ARMÁRIO -->

<div id="popupArmario" class="popup">

    <div class="popup-conteudo">

        <h2>Armário</h2>

        <p id="infoArmario"></p>

        <select id="selectFuncionario"></select>

        <button onclick="vincularArmario()">
            Salvar
        </button>

        <button onclick="fecharPopup()">
            Fechar
        </button>

    </div>

</div>
<!-- POPUP FILTRO PONTO -->

<div id="popupFiltroPonto" class="popup">

    <div class="popup-conteudo">

        <h2>Filtrar Data</h2>

        <input
            type="date"
            id="filtroPonto"
        >

        <button onclick="aplicarFiltroPonto()">
            Filtrar
        </button>

        <button onclick="limparFiltroPonto()">
            Hoje
        </button>

        <button onclick="fecharFiltroPonto()">
            Fechar
        </button>

    </div>

</div>
<script src="app.js"></script>

</body>
</html>
