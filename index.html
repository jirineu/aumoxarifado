<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Material</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">

  <header>
    <h1>Bruna Construções</h1>
    <p>Controle de Saída de Material</p>
  </header>

  <section class="form-section">

    <div class="input-group">
      <label>Nome do Funcionário</label>
      <input type="text" id="funcionario" placeholder="Digite o nome">
    </div>

    <div class="input-group">
      <label>Material</label>
      <input type="text" id="material" placeholder="Digite o material">
    </div>

    <div class="input-group">
      <label>Quantidade</label>
      <input type="number" id="quantidade" placeholder="Digite a quantidade">
    </div>

    <button onclick="adicionarRegistro()">
      Registrar Saída
    </button>

  </section>

  <section class="historico-section">

    <div class="historico-topo">
      <h2>Histórico do Dia</h2>

      <button class="btn-filtro" onclick="abrirFiltro()">
        Filtro
      </button>
    </div>

    <div id="historico"></div>

  </section>

</div>

<!-- POPUP FILTRO -->
<div class="modal" id="modalFiltro">

  <div class="modal-content">

    <h3>Filtrar Histórico</h3>

    <div class="input-group">
      <label>Data Inicial</label>
      <input type="date" id="dataInicio">
    </div>

    <div class="input-group">
      <label>Data Final</label>
      <input type="date" id="dataFim">
    </div>

    <button onclick="filtrarHistorico()">
      Filtrar
    </button>

    <button class="btn-fechar" onclick="fecharFiltro()">
      Fechar
    </button>

  </div>

</div>

<!-- POPUP EXTRAVIO -->
<div class="modal" id="modalExtravio">

  <div class="modal-content">

    <h3>Motivo do Extravio</h3>

    <textarea
      id="motivoExtravio"
      placeholder="Explique o motivo..."
    ></textarea>

    <button onclick="confirmarExtravio()">
      Confirmar
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
